info:
  name: Paginated Thread Listing
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseURL}}threads?page=1&limit=3"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "3"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
